# ============================================================
# violin-calendar 公共配置
# ============================================================
# profile 切换：
#   local: 本机 IDE 调试（独立 schema / SQL 日志）
#   dev:   K8s violin-dev namespace（QA 测试）
#   prod:  K8s violin-prod namespace（本番）
# ============================================================

server:
  port: 8085
  servlet:
    context-path: /calendar

spring:
  application:
    name: violin-calendar
  profiles:
    active: local
  messages:
    basename: classpath:messages-common
    encoding: UTF-8
    cache-duration: 1h

violin:
  auth:
    exclude-paths: "/api/v1/event/**"